<svg width="180" height="180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="180" height="180" rx="40" fill="url(#grad)"/>

  <!-- 书本图标 -->
  <g transform="translate(40, 45)">
    <!-- 书本主体 -->
    <rect x="10" y="20" width="80" height="70" rx="4" fill="white" opacity="0.95"/>

    <!-- 书脊 -->
    <rect x="45" y="20" width="10" height="70" fill="#667eea" opacity="0.3"/>

    <!-- 字母A -->
    <text x="30" y="55" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#667eea">A</text>

    <!-- 字母B -->
    <text x="55" y="55" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#764ba2">B</text>

    <!-- 星星装饰 -->
    <circle cx="20" cy="30" r="3" fill="#ffd700"/>
    <circle cx="75" cy="35" r="2.5" fill="#ffd700"/>
  </g>

  <!-- 底部文字 -->
  <text x="90" y="140" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">单词学习</text>
</svg>
